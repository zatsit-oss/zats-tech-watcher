---
name: Fetch and build Tech Watcher
description: Fetch and build the tech watcher portal

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      shell: bash
      run: |
        npm install

    - name: Build project
      shell: bash
      run: |
        npm run build
